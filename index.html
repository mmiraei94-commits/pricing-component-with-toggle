<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pricing-component-with-toggle</title>
    <link rel="stylesheet" href="src/output.css" />
  </head>
  <body
    class="bg-very-light-grayish-blue bg-[url('./src/images/bg-top.svg')] h-screen px-[64px] py-[24px] font-[Montserrat]"
  >
    <main class="justify-items-center">
      <h1 class="mb-[42px] text-grayish-blue text-[24px] font-[700]">
        Our Pricing
      </h1>
      <div class="flex w-[239px] justify-between mb-[88px]">
        <label for="" class="text-light-grayish-blue text-[15px] font-[700]"
          >Annually</label
        >
        <div
          class="w-[56px] h-[32px] bg-linear-to-l from-[#696fdd] to-[#a3a8f0] rounded-full content-center px-1"
        >
          <div class="size-[24px] bg-white rounded-full"></div>
        </div>
        <label for="" class="text-light-grayish-blue text-[15px] font-[700]"
          >Monthly</label
        >
      </div>
      <section>
        <div
          class="w-[327px] h-full rounded-[12px] bg-white px-[30px] pt-[36px] pb-[30px] justify-items-center shadow-2xl"
        >
          <div class="font-[700] text-grayish-blue mb-[20px]">Basic</div>
          <div
            class="font-bold text-[72px] text-dark-grayish-blue pb-[26px] border-light-grayish-blue border-b-1 w-full flex items-center justify-center gap-2"
          >
            <div class="text-[40px]">$</div><div>19.99</div>
          </div>
          <div
            class="font-[700] text-[15px] text-grayish-blue py-[16px] border-light-grayish-blue border-b-1 w-full text-center"
          >
            500 GB Storage
          </div>
          <div
            class="font-[700] text-[15px] text-grayish-blue py-[16px] border-light-grayish-blue border-b-1 w-full text-center"
          >
            2 Users Allowed
          </div>
          <div
            class="font-[700] text-[15px] text-grayish-blue py-[16px] border-light-grayish-blue border-b-1 w-full text-center mb-[26px]"
          >
            Send up to 3 GB
          </div>
          <div class="w-full">
            <button
              class="bg-linear-to-l from-[#696fdd] to-[#a3a8f0] w-full h-[45px] rounded-[12px] text-white"
            >
              LEARN MORE
            </button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
